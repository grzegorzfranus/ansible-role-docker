---
# Docker Prune — Configure systemd timer for docker system prune.

- name: Docker | prune | Deploy systemd service
  become: true
  ansible.builtin.template:
    src: systemd/docker-prune.service.j2
    dest: /etc/systemd/system/docker-prune.service
    owner: root
    group: root
    mode: '0644'
  notify: Docker | handlers | Reload systemd

- name: Docker | prune | Deploy systemd timer
  become: true
  ansible.builtin.template:
    src: systemd/docker-prune.timer.j2
    dest: /etc/systemd/system/docker-prune.timer
    owner: root
    group: root
    mode: '0644'
  notify: Docker | handlers | Reload systemd

- name: Docker | prune | Enable and start timer
  become: true
  ansible.builtin.systemd:
    name: docker-prune.timer
    enabled: true
    state: started
