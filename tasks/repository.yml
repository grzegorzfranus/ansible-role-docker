---
# Docker Repository — Configure official Docker repositories with GPG verification.

- name: Docker | repository | Create apt keyrings directory
  become: true
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  when:
    - ansible_facts['os_family'] == 'Debian'

- name: Docker | repository | Download Docker GPG key (ASCII)
  become: true
  ansible.builtin.get_url:
    url: "https://download.docker.com/linux/{{ 'ubuntu' if ansible_facts.distribution | lower == 'ubuntu' else 'debian' }}/gpg"
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
  when:
    - ansible_facts['os_family'] == 'Debian'

- name: Docker | repository | Set up apt repository
  become: true
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ __docker_apt_arch }} signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/{{ 'ubuntu' if ansible_facts.distribution | lower == 'ubuntu' else 'debian' }}
      {{ __docker_apt_codename }} stable
    state: present
    filename: docker
    update_cache: true
  when:
    - ansible_facts['os_family'] == 'Debian'

- name: Docker | repository | Configure yum repository (EL)
  become: true
  ansible.builtin.yum_repository:
    name: docker-ce-stable
    description: Docker CE Stable - $basearch
    baseurl: "{{ __docker_yum_baseurl }}"
    enabled: true
    gpgcheck: true
    gpgkey: "{{ __docker_yum_gpgkey }}"
  when:
    - ansible_facts['os_family'] == 'RedHat'
