---
# Docker Logging — Configure rsyslog, logrotate, and log file management.

- name: Docker | logging | Ensure custom log directory exists
  become: true
  ansible.builtin.file:
    path: "{{ docker_log_directory_path }}"
    state: directory
    owner: "{{ __docker_os_log_user | default(docker_rsyslog_log_file_owner) }}"
    group: "{{ __docker_os_log_group | default(docker_rsyslog_log_file_group) }}"
    mode: '0755'
  when:
    - docker_log_directory_path | length > 0
    - docker_log_directory_path != '/var/log'

- name: Docker | logging | Compute log file path
  ansible.builtin.set_fact:
    __docker_log_file_path: >-
      {{ (docker_log_directory_path | length > 0)
          | ternary(docker_log_directory_path ~ '/docker.log', '/var/log/docker.log') }}

- name: Docker | logging | Ensure log file exists with proper permissions
  become: true
  ansible.builtin.file:
    path: "{{ __docker_log_file_path }}"
    state: touch
    owner: "{{ __docker_os_log_user | default(docker_rsyslog_log_file_owner) }}"
    group: "{{ __docker_os_log_group | default(docker_rsyslog_log_file_group) }}"
    mode: "{{ docker_rsyslog_log_file_mode }}"
    modification_time: preserve
    access_time: preserve

- name: Docker | logging | Ensure rsyslog.d directory exists
  become: true
  ansible.builtin.file:
    path: /etc/rsyslog.d
    state: directory
    mode: '0755'
    owner: root
    group: root

- name: Docker | logging | Configure rsyslog for Docker
  become: true
  ansible.builtin.template:
    src: rsyslog/docker.conf.j2
    dest: "/etc/rsyslog.d/{{ docker_rsyslog_conf_name }}"
    owner: root
    group: root
    mode: '0644'
    backup: true
  notify: Docker | handlers | Restart rsyslog

- name: Docker | logging | Check if archive log directory exists
  become: true
  ansible.builtin.stat:
    path: "{{ docker_logrotate_options.archive_directory_path | default(docker_log_directory_path) }}"
  register: __docker_log_archive_stat

- name: Docker | logging | Create archive log directory if needed
  become: true
  ansible.builtin.file:
    path: "{{ docker_logrotate_options.archive_directory_path | default(docker_log_directory_path) }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when:
    - not __docker_log_archive_stat.stat.exists

- name: Docker | logging | Deploy logrotate configuration file
  become: true
  ansible.builtin.template:
    src: logrotate/docker.j2
    dest: /etc/logrotate.d/docker
    owner: root
    group: root
    mode: "0644"
    backup: true

- name: Docker | logging | Display logging configuration status
  ansible.builtin.debug:
    msg:
      - "Logging: {{ __docker_log_file_path }} ({{ docker_logrotate_options.frequency }})"
    verbosity: 1
  when:
    - docker_collect_system_info | bool
