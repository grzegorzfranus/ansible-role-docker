---
# Docker Main — Orchestrates role execution in order.
# Flow: vars → validate → assert → OS check → prereqs → repo → install → configure → logging → service → prune → backup → audit → remove

- name: Docker | include_vars | Gather OS specific variables
  ansible.builtin.include_vars: "{{ lookup('first_found', params) }}"
  vars:
    params:
      files:
        - "{{ ansible_facts['distribution'] | lower }}_{{ ansible_facts['distribution_version'] | lower }}.yml"
        - "{{ ansible_facts['distribution'] | lower }}_{{ ansible_facts['distribution_major_version'] | lower }}.yml"
        - "{{ ansible_facts['distribution'] | lower }}.yml"
        - "{{ ansible_facts['os_family'] | lower }}_{{ ansible_facts['distribution_version'] | lower }}.yml"
        - "{{ ansible_facts['os_family'] | lower }}_{{ ansible_facts['distribution_major_version'].split('.')[0] }}.yml"
        - "{{ ansible_facts['os_family'] | lower }}.yml"
        - "main.yml"
      paths:
        - "{{ role_path }}/vars"
  tags:
    - always
    - setup
    - init

- name: Docker | validate | Perform comprehensive system validation
  ansible.builtin.include_tasks: validate.yml
  when:
    - docker_validate_system | bool
    - docker_state | lower != 'absent'
  tags:
    - always
    - validate
    - setup
    - init

- name: Docker | assert | Validate all role variables
  ansible.builtin.include_tasks: assert.yml
  tags:
    - always
    - validate
    - setup
    - init

- name: Docker | assert | Check if OS is supported
  ansible.builtin.assert:
    that:
      - >-
        (ansible_facts['distribution'] == 'Ubuntu' and ansible_facts['distribution_version'] in ['22.04', '24.04']) or
        (ansible_facts['distribution'] == 'Debian' and ansible_facts['distribution_major_version'] in ['11', '12']) or
        (ansible_facts['os_family'] == 'RedHat' and ansible_facts['distribution_major_version'] == '9')
    fail_msg: "This role only supports Ubuntu 22.04/24.04, Debian 11/12, and EL9 (Rocky/RHEL/Alma 9)"
    success_msg: "Running on supported OS: {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_version'] }}"
  tags:
    - always
    - setup
    - init

- name: Docker | prerequisites | Verify system prerequisites
  ansible.builtin.include_tasks: prerequisites.yml
  when:
    - docker_state | lower != 'absent'
  tags:
    - install
    - requirements
    - setup

- name: Docker | repository | Configure package repositories
  ansible.builtin.include_tasks: repository.yml
  when:
    - docker_state | lower != 'absent'
  tags:
    - requirements
    - setup

- name: Docker | install | Install Docker packages
  ansible.builtin.include_tasks: install.yml
  when:
    - docker_state | lower != 'absent'
  tags:
    - install
    - setup

- name: Docker | configure | Configure daemon.json and systemd drop-ins
  ansible.builtin.include_tasks: configure.yml
  when:
    - docker_state | lower != 'absent'
  tags:
    - configure
    - setup

- name: Docker | logging | Configure rsyslog and logrotate
  ansible.builtin.include_tasks: logging.yml
  when:
    - docker_state | lower != 'absent'
    - docker_configure_rsyslog | bool
  tags:
    - configure
    - logging

- name: Docker | service | Enable and start docker service
  ansible.builtin.include_tasks: service.yml
  when:
    - docker_state | lower != 'absent'
  tags:
    - setup
    - service

- name: Docker | prune | Configure prune systemd timer
  ansible.builtin.include_tasks: prune.yml
  when:
    - docker_state | lower != 'absent'
    - docker_prune_enabled | bool
  tags:
    - configure
    - prune

- name: Docker | backup | Configure backup systemd timer
  ansible.builtin.include_tasks: backup.yml
  when:
    - docker_state | lower != 'absent'
    - docker_backup_enabled | bool
  tags:
    - configure
    - backup

- name: Docker | audit | Configure audit rule for docker.sock
  ansible.builtin.include_tasks: audit.yml
  when:
    - docker_state | lower != 'absent'
    - docker_audit_socket | bool
  tags:
    - configure
    - audit

- name: Docker | state | Handle absent state
  ansible.builtin.include_tasks: remove.yml
  when:
    - docker_state | lower == 'absent'
  tags:
    - always
    - init
    - configure
    - install
