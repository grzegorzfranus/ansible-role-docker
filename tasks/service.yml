---
# Docker Service — Configure service startup and management.

- name: Docker | service | Enable and start docker
  become: true
  ansible.builtin.service:
    name: "{{ __docker_service_name }}"
    enabled: "{{ docker_service_enabled }}"
    state: started

- name: Docker | service | Ensure docker socket has correct group/mode
  become: true
  ansible.builtin.file:
    path: /var/run/docker.sock
    state: file
    owner: root
    group: docker
    mode: '0660'
  failed_when: false

- name: Docker | service | Verify service configuration (systemd)
  ansible.builtin.systemd:
    name: "{{ __docker_service_name }}"
  register: __docker_service_status
  failed_when: false
  when:
    - ansible_facts['service_mgr'] == 'systemd'

- name: Docker | service | Report service configuration status
  ansible.builtin.debug:
    msg:
      - "Service {{ __docker_service_name }}: {{ __docker_service_status.status.ActiveState | default('unknown') }}"
    verbosity: 1
  when:
    - docker_collect_system_info | bool

- name: Docker | service | Handle service configuration errors
  ansible.builtin.include_tasks: error_reporting.yml
  when:
    - docker_enhanced_error_reporting | bool
    - __docker_service_status is defined
    - __docker_service_status.failed | default(false)
