---
# Docker Prerequisites — Install required packages before Docker setup.

- name: Docker | prerequisites | Ensure base packages present (Debian/Ubuntu)
  become: true
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: true
  register: __docker_debian_prereqs_result
  until: __docker_debian_prereqs_result is succeeded
  retries: 3
  delay: 5
  when:
    - ansible_facts['os_family'] == 'Debian'

- name: Docker | prerequisites | Ensure base packages present (EL)
  become: true
  ansible.builtin.dnf:
    name:
      - ca-certificates
      - dnf-plugins-core
    state: present
  register: __docker_el_prereqs_result
  until: __docker_el_prereqs_result is succeeded
  retries: 3
  delay: 5
  when:
    - ansible_facts['os_family'] == 'RedHat'

- name: Docker | prerequisites | Gather installed packages (EL)
  ansible.builtin.package_facts:
    manager: auto
  when:
    - ansible_facts['os_family'] == 'RedHat'

- name: Docker | prerequisites | Ensure curl present when neither curl nor curl-minimal installed (EL)
  become: true
  ansible.builtin.dnf:
    name: curl
    state: present
  when:
    - ansible_facts['os_family'] == 'RedHat'
    - not ('curl' in ansible_facts.packages)
    - not ('curl-minimal' in ansible_facts.packages)

- name: Docker | prerequisites | Check if /var/lib/docker is a separate mount
  ansible.builtin.set_fact:
    __docker_var_lib_is_mount: >-
      {{ (ansible_facts.mounts | default(ansible_mounts | default([]))) | selectattr('mount', 'equalto', '/var/lib/docker') | list | length > 0 }}

- name: Docker | prerequisites | Warn if /var/lib/docker is not a separate filesystem
  ansible.builtin.debug:
    msg: "Warning: /var/lib/docker is not a separate filesystem. Consider dedicating a partition if you expect large images/volumes."
  when:
    - not __docker_var_lib_is_mount | default(false)

- name: Docker | prerequisites | Report installation status
  ansible.builtin.debug:
    msg:
      - "Prerequisites installed successfully"
    verbosity: 1
  when:
    - docker_collect_system_info | bool

- name: Docker | prerequisites | Handle installation errors
  ansible.builtin.include_tasks: error_reporting.yml
  when:
    - docker_enhanced_error_reporting | bool
    - >-
      (__docker_debian_prereqs_result is defined and __docker_debian_prereqs_result.failed | default(false)) or
      (__docker_el_prereqs_result is defined and __docker_el_prereqs_result.failed | default(false))
