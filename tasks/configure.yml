---
# Docker Configure — Daemon configuration, systemd drop-ins, and optional networks.

- name: Docker | configure | Ensure /etc/docker exists
  become: true
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    mode: '0755'

- name: Docker | configure | Render daemon.json
  become: true
  ansible.builtin.template:
    src: docker/daemon.json.j2
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: '0644'
  notify:
    - Docker | handlers | Restart docker service

- name: Docker | configure | Ensure systemd drop-in dir exists for docker.service
  become: true
  ansible.builtin.file:
    path: /etc/systemd/system/docker.service.d
    state: directory
    mode: '0755'

- name: Docker | configure | Override ExecStart to avoid flag conflicts
  become: true
  ansible.builtin.template:
    src: systemd/docker-service-override.conf.j2
    dest: /etc/systemd/system/docker.service.d/override.conf
    owner: root
    group: root
    mode: '0644'
  notify:
    - Docker | handlers | Reload systemd
    - Docker | handlers | Restart docker service

- name: Docker | configure | Configure proxy environment for docker.service
  become: true
  ansible.builtin.template:
    src: systemd/docker-service-proxy.conf.j2
    dest: /etc/systemd/system/docker.service.d/proxy.conf
    owner: root
    group: root
    mode: '0644'
  when:
    - (docker_http_proxy | length > 0) or
      (docker_https_proxy | length > 0) or
      (docker_no_proxy | length > 0)
  notify:
    - Docker | handlers | Reload systemd
    - Docker | handlers | Restart docker service

- name: Docker | configure | Ensure systemd drop-in dir exists for docker.socket
  become: true
  ansible.builtin.file:
    path: /etc/systemd/system/docker.socket.d
    state: directory
    mode: '0755'

- name: Docker | configure | Enforce docker.sock group/mode via systemd override
  become: true
  ansible.builtin.template:
    src: systemd/docker-socket-override.conf.j2
    dest: /etc/systemd/system/docker.socket.d/override.conf
    owner: root
    group: root
    mode: '0644'
  notify:
    - Docker | handlers | Reload systemd
    - Docker | handlers | Restart docker service

- name: Docker | configure | Create user-defined networks
  ansible.builtin.include_tasks: network.yml
  when:
    - docker_networks | length > 0
