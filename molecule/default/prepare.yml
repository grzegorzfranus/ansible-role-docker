# =============================================================================
# Ansible Role: Docker - Molecule Preparation Playbook
# =============================================================================
# Prepare the systemd-enabled container for role execution.
#
# Flow:
# 1. Fix /etc/shadow permissions (workaround for some images)
# =============================================================================

---
- name: 🧪 Docker | molecule | Prepare
  hosts: all
  gather_facts: true

  tasks:
    - name: 🧪 Docker | molecule | prepare | Disable EPEL repository (RedHat)
      ansible.builtin.shell: |
        if [ -f /etc/yum.repos.d/epel.repo ]; then
          sed -i 's/enabled=1/enabled=0/g' /etc/yum.repos.d/epel*.repo || true
        fi
      failed_when: false
      changed_when: false
      when: ansible_facts['os_family'] == "RedHat"

    - name: 🧪 Docker | molecule | prepare | Fix /etc/shadow permissions
      register: etc_shadow
      ansible.builtin.shell:
        cmd: |
          echo ""
          ls -l /etc/shadow || true
          chmod 0400 /etc/shadow || true
          ls -l /etc/shadow || true
          echo ""

    - name: 🧪 Docker | molecule | prepare | Show shadow permissions
      ansible.builtin.debug:
        var: etc_shadow.stdout
