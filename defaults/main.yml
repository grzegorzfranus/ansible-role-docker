---
# =============================================================================
# Ansible Role: Docker - Default Variables
# =============================================================================
# This file defines default configuration values for Docker Engine.
# These values can be overridden by setting them in your playbook or inventory.
#
# Supported OS distributions:
# - Ubuntu 24.04 (Noble) and variants
# - Ubuntu 22.04 (Jammy) and variants
# - Debian 12 (Bookworm) and variants
# - Debian 11 (Bullseye) and variants
# - EL9: Rocky Linux 9, RHEL 9, AlmaLinux 9
#
# Sections:
#   1. Service State (Lifecycle)
#   2. General Settings
#   3. Packages and Repository
#   4. Daemon Configuration
#   5. Proxy and Registry
#   6. Logging to Files (rsyslog + logrotate)
#   7. Prune Timer
#   8. Backup Timer
#   9. Rootless Mode
#   10. Networks
#   11. Audit
#   12. System Validation Settings
#   13. Error Reporting Configuration
# =============================================================================

# -----------------------------------------------------------------------------
# 1. Service State (Lifecycle)
# -----------------------------------------------------------------------------
# Control overall role behavior: install or uninstall
docker_state: "present"

# -----------------------------------------------------------------------------
# 2. General Settings
# -----------------------------------------------------------------------------
# Manage and enable Docker service
docker_service_enabled: true

# Package state for Docker packages (present|latest)
docker_package_state: "present"

# Users to be added to the 'docker' group
docker_users: []

# -----------------------------------------------------------------------------
# 3. Packages and Repository
# -----------------------------------------------------------------------------
# Install compose and buildx plugins by default
docker_install_compose_plugin: true
docker_install_buildx_plugin: true

# Additional packages list (advanced)
docker_extra_packages: []

# -----------------------------------------------------------------------------
# 4. Daemon Configuration
# -----------------------------------------------------------------------------
# By default bind only to the Unix socket
docker_enable_tcp_socket: false
docker_tcp_listen: "0.0.0.0:2375"  # Non-TLS TCP; use with caution

# Default log-driver and options
docker_log_driver: "json-file"
docker_log_opts:
  max-size: "10m"
  max-file: "3"

# Registry mirrors
docker_registry_mirrors: []  # e.g. ["https://mirror.gcr.io"]

# Extra daemon.json content merged on top (mapping)
docker_daemon_extra: {}

# -----------------------------------------------------------------------------
# 5. Proxy and Registry
# -----------------------------------------------------------------------------
docker_http_proxy: ""
docker_https_proxy: ""
docker_no_proxy: ""

# -----------------------------------------------------------------------------
# 6. Logging to Files (rsyslog + logrotate)
# -----------------------------------------------------------------------------
# If true, configure rsyslog to write dockerd logs to file and rotate them
docker_configure_rsyslog: false
# Default directory for docker logs
docker_log_directory_path: "/var/log/docker"
# Rsyslog file and options
docker_rsyslog_conf_name: "99-docker.conf"
docker_rsyslog_imjournal_filecreatemode: "0644"
# Target log file ownership and permissions (overridden per-OS in vars/)
docker_rsyslog_log_file_owner: "root"
docker_rsyslog_log_file_group: "adm"
docker_rsyslog_log_file_mode: "0640"
# Logrotate options
docker_logrotate_options:
  frequency: "weekly"  # hourly|daily|weekly|monthly
  count: 12
  missingok: true
  compress: true
  nocreate: false
  dateext: true
  archive_directory_path: "{{ docker_log_directory_path }}"
  copytruncate: true

# When copytruncate is disabled, create a new log file after rotation with these settings
docker_logrotate_create:
  enabled: true
  mode: "0640"
  owner: "{{ docker_rsyslog_log_file_owner }}"
  group: "{{ docker_rsyslog_log_file_group }}"

# -----------------------------------------------------------------------------
# 7. Prune Timer
# -----------------------------------------------------------------------------
docker_prune_enabled: false
docker_prune_frequency: "weekly"  # daily|weekly|monthly
docker_prune_flags: "--all --volumes --force"

# -----------------------------------------------------------------------------
# 8. Backup Timer
# -----------------------------------------------------------------------------
docker_backup_enabled: false
docker_backup_path: "/var/backups/docker"
docker_backup_retention: 7
docker_backup_include_volumes_metadata: false

# -----------------------------------------------------------------------------
# 9. Rootless Mode
# -----------------------------------------------------------------------------
docker_rootless_enabled: false
docker_rootless_users: []

# -----------------------------------------------------------------------------
# 10. Networks
# -----------------------------------------------------------------------------
# Example: [{ name: "app-net", driver: "bridge", subnet: "172.30.0.0/16" }]
docker_networks: []

# -----------------------------------------------------------------------------
# 11. Audit
# -----------------------------------------------------------------------------
docker_audit_socket: false

# -----------------------------------------------------------------------------
# 12. System Validation Settings
# -----------------------------------------------------------------------------
# Enable comprehensive system validation checks
docker_validate_system: true

# Enable network connectivity verification to Docker repositories
docker_validate_connectivity: true

# Enable architecture and package manager validation
docker_validate_prerequisites: true

# Collect detailed system information for error reporting
docker_collect_system_info: true

# Timeout for network connectivity checks (seconds)
docker_connectivity_timeout: 10

# -----------------------------------------------------------------------------
# 13. Error Reporting Configuration
# -----------------------------------------------------------------------------
# Enable enhanced error reporting with system diagnostics
docker_enhanced_error_reporting: true

# Include system hardware information in error reports
docker_include_hardware_info: true

# Include network configuration in error reports
docker_include_network_info: true

# Include package manager state in error reports
docker_include_package_info: true

# Maximum lines of log output to include in error reports
docker_error_log_lines: 50
