---
galaxy_info:
  role_name: docker
  author: Grzegorz Franus
  namespace: grzegorzfranus
  description: >
    Ansible role for installing and configuring Docker Engine from official repositories
    with secure defaults, daemon configuration, optional dedicated logging, scheduled
    pruning and backups, and comprehensive validation with error reporting.
  license: Apache-2.0
  company: EWARE
  min_ansible_version: "2.16"

  platforms:
    - name: Debian
      versions:
        - "bullseye"
        - "bookworm"
    - name: Ubuntu
      versions:
        - "jammy"
        - "noble"
    - name: EL
      versions:
        - "9"

  galaxy_tags:
    - docker
    - containerd
    - containers
    - security
    - logging
    - devops
    - systemd

dependencies: []
